<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a" />
      <stop offset="100%" style="stop-color:#2563eb" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Decorative circles -->
  <circle cx="1050" cy="150" r="200" fill="rgba(255,255,255,0.05)" />
  <circle cx="900" cy="400" r="150" fill="rgba(255,255,255,0.03)" />

  <!-- Left content -->
  <text x="80" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#ffffff">Kerjain</text>
  <text x="80" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#60a5fa">Aja</text>

  <!-- Tagline -->
  <text x="80" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#bfdbfe" font-weight="400">Panduan Lengkap Cari Kerja Online di Indonesia</text>

  <!-- Badge -->
  <rect x="80" y="420" width="200" height="36" rx="18" fill="rgba(255,255,255,0.15)" />
  <text x="180" y="444" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#bfdbfe" text-anchor="middle" font-weight="600">Tips CV · Interview · Karir</text>

  <!-- Right icon - briefcase -->
  <g transform="translate(920, 210)" fill="none" stroke="#60a5fa" stroke-width="4">
    <!-- Briefcase body -->
    <rect x="0" y="30" width="160" height="130" rx="10" stroke="#60a5fa" fill="rgba(96,165,250,0.08)" />
    <!-- Handle -->
    <path d="M55 30 L55 15 Q55 0 80 0 L80 0 Q105 0 105 15 L105 30" stroke="#93c5fd" fill="none" />
    <!-- Lines -->
    <line x1="20" y1="70" x2="140" y2="70" stroke="rgba(255,255,255,0.15)" />
    <line x1="20" y1="90" x2="140" y2="90" stroke="rgba(255,255,255,0.15)" />
    <circle cx="80" cy="50" r="12" fill="#60a5fa" />
  </g>

  <!-- URL at bottom -->
  <text x="80" y="570" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#93c5fd">kerjainaja.vercel.app</text>
</svg>
